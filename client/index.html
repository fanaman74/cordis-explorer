<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>CORDIS Explorer — Search EU-Funded Research Projects</title>
    <meta name="description" content="Explore 50,000+ EU-funded research projects from Horizon Europe, H2020 and FP7. Search CORDIS data, discover partner organisations, find grants, and visualise research networks — powered by AI." />
    <meta name="keywords" content="CORDIS, EU research, Horizon Europe, H2020, FP7, EU grants, research projects, European funding, grant search, research partners, SPARQL, knowledge graph" />
    <link rel="canonical" href="https://cordis-explorer.eu/" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="CORDIS Explorer" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://cordis-explorer.eu/" />
    <meta property="og:title" content="CORDIS Explorer — Search EU-Funded Research Projects" />
    <meta property="og:description" content="Explore 50,000+ EU-funded research projects from Horizon Europe, H2020 and FP7. AI-powered grant matching and research partner discovery." />
    <meta property="og:image" content="https://cordis-explorer.eu/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="CORDIS Explorer" />
    <meta property="og:locale" content="en_GB" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="CORDIS Explorer — Search EU-Funded Research Projects" />
    <meta name="twitter:description" content="Explore 50,000+ EU-funded research projects. AI-powered grant matching and research partner discovery for Horizon Europe, H2020 and FP7." />
    <meta name="twitter:image" content="https://cordis-explorer.eu/og-image.png" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "WebSite",
          "@id": "https://cordis-explorer.eu/#website",
          "url": "https://cordis-explorer.eu/",
          "name": "CORDIS Explorer",
          "description": "Search and explore EU-funded research projects from Horizon Europe, H2020 and FP7",
          "potentialAction": {
            "@type": "SearchAction",
            "target": {
              "@type": "EntryPoint",
              "urlTemplate": "https://cordis-explorer.eu/search?q={search_term_string}"
            },
            "query-input": "required name=search_term_string"
          }
        },
        {
          "@type": "Organization",
          "@id": "https://cordis-explorer.eu/#organization",
          "url": "https://cordis-explorer.eu/",
          "name": "CORDIS Explorer",
          "description": "AI-powered platform for discovering EU-funded research projects and partners",
          "sameAs": []
        }
      ]
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
